# Redirect all HTTP requests to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name snippy.shamilkp.me localhost;

    return 301 https://$host$request_uri;
}

# HTTPS server configuration
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name snippy.shamilkp.me localhost;

    ssl_certificate /etc/nginx/certs/snippy.pem;
    ssl_certificate_key /etc/nginx/certs/snippy.key;

    # SSL protocols and ciphers optimized for Cloudflare & modern browsers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Reverse proxy for frontend assets and fallback to app backend
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Explicit routing for API endpoints to Go backend
    location /api/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Explicit routing for Swagger documentation to Go backend
    location /swagger/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Route shortened URLs (e.g. /abc123) to backend for redirection
    # This location block handles path patterns not starting with api, swagger, or containing static file extensions.
    location ~ ^/([a-zA-Z0-9_-]+)$ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
