name: Go Tests

on: 
    push:
        branches: [ "main" , "dev"]
    pull_request:
        branches: [ "main" , "dev" ]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: url_shortener
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - run: go mod download

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: password
          DB_NAME: url_shortener
          DB_SSLMODE: disable
          APP_PORT: 8080
          BASE_URL: http://localhost:8080/
        run: go fmt ./... && go vet ./... && go test ./...
