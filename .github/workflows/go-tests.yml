name: Go Tests

on: 
    push:
        branches: [ "main" , "dev"]
    pull_request:
        branches: [ "main" , "dev" ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - run: go mod download

      - run: go test ./...